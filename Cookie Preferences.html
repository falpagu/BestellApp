<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Preferences</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="basket.css" />
  </head>

  <body onload="init()">
    <header>
      <nav class="wrapper HeaderContainer">
        <a href="index.html"><img src="./assets/icons-logos/Logo.png" alt="logo" /></a>
        <a href="index.html">
          <img src="./assets/icons-logos/menu-bar.svg" alt="hamburger icon"
        /></a>
      </nav>
    </header>

    <main>
     <div id="cookieConsent" class="cookie-consent">
  <div class="cookie-content wrapper">
    <h2>Cookie-Einstellungen</h2>
    <p>Wir verwenden Cookies, um deine Erfahrung zu verbessern und personalisierte Inhalte anzuzeigen. Du kannst auswählen, welche Cookies du akzeptierst.</p>
    
    <div class="cookie-options">
      <label>
        <input type="checkbox" checked disabled> Essenzielle Cookies (immer aktiv)
      </label>
      <label>
        <input type="checkbox" id="analyticsCookies"> Analytische Cookies
      </label>
      <label>
        <input type="checkbox" id="marketingCookies"> Marketing-Cookies
      </label>
    </div>

    <div class="cookie-buttons">
      <button id="acceptAll">Alle akzeptieren</button>
      <button id="savePreferences">Speichern</button>
    </div>
  </div>
</div>


    </main>

    <!-- FOOTER -->
    <footer>
      <div class="FooterContainer wrapper">
        <span> ©2025 BurgerHouse</span>
        <a href="imprint.html">Imprint</a>
        <a href="Cookie Preferences.html">Cookie Preferences</a>
      </div>
    </footer>

    <script src="template.js"></script>
    <script src="databank.js"></script>
    <script src="main.js"></script>
  </body>
</html>
